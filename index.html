<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #container {
        max-width: 420px;
        margin: 0 auto;
      }

      h1 {
        font-size: 2em;
      }

      summary {
        cursor: pointer;
      }

      details {
        background-color: #eee;
        border: 1px solid #aaa;
        padding: 1rem;
        margin: 2px;
      }

      .table {
        background-color: #fff;
        border-collapse: collapse;
        font-size: 1rem;
        margin: 1rem 0;
        width: 100%;
      }

      .table td {
        border: 1px solid #ddd;
        padding: 8px;
      }

      .table td:nth-child(even) {
        text-align: right;
      }

      .table tr:hover {
        background-color: #ddd;
      }

      .table-striped tr:nth-child(even) {
        background-color: #f8f8f8;
      }

      .moreInfo {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
      }
      .moreInfo p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <section id="container">
      <h1>Buoys Portugal</h1>
      <p>
        Via <a href="https://www.hidrografico.pt">hidrografico.pt</a><br />
        <!-- Via <a href="http://www.climaat.angra.uac.pt/">climaat.angra.uac.pt</a> -->
      </p>
    </section>

    <script>
      const referer = 'https://www.hidrografico.pt'

      const fetchList = async () => {
        const ondobuoys = await fetchWithReferer(`${referer}/hmapi/ondobuoys/`)
        const multibuoys = await fetchWithReferer(`${referer}/hmapi/multibouys/`)
        return [
          ...ondobuoys.features.map((b) => ({ ...b, type: 'ondobuoy' })),
          ...multibuoys.features.map((b) => ({ ...b, type: 'multibuoy' })),
        ]
          .map((buoy) => {
            const path = buoy.type === 'multibuoy' ? 'multibuoystation' : 'ondobuoystation'
            const url = `${referer}/hmapi/${path}/?buoyID=${buoy.properties.id_est}`
            return { ...buoy, url }
          })
          .sort((a, b) => b.geometry.coordinates[1] - a.geometry.coordinates[1])
      }

      const fetchWithReferer = async (url) => {
        try {
          const host = 'https://referereverywhere.bordalix.workers.dev'
          const resp = await fetch(`${host}/?referer=${referer}&tofetch=${url}`)
          return await resp.json()
        } catch {}
      }

      const moreInfo = (buoy) => {
        const [lon, lat] = buoy.geometry.coordinates
        const coord = `${Math.abs(lat)}° ${lat >= 0 ? 'N' : 'S'}, ${Math.abs(lon)}° ${lon >= 0 ? 'E' : 'W'}`
        const depth = buoy.properties.depth ? `${buoy.properties.depth}m` : 'N/A'
        return `
          <div class="moreInfo">
            <p>📍 ${coord}</p>
            <p>${depth} ⏬</p>
          </div>
        `
      }

      const genHTMLTable = (buoy) => {
        return `
          <table class="table table-striped">
            <tbody>
              <tr>
                <td>Última leitura</td>
                <td>${buoy.date}</td>
              </tr>
              <tr>
                <td>Altura significativa</td>
                <td>${buoy.hm0} m</td>
              </tr>
              <tr>
                <td>Altura máxima</td>
                <td>${buoy.hmax} m</td>
              </tr>
              <tr>
                <td>Período médio</td>
                <td>${buoy.t02} s</td>
              </tr>
              <tr>
                <td>Período máximo observado</td>
                <td>${buoy.tmax} s</td>
              </tr>
              <tr>
                <td>Direção da ondulação</td>
                <td>${buoy.thtp}</td>
              </tr>
              <tr>
                <td>Temperatura da água</td>
                <td>${buoy.temp} °C</td>
              </tr>
            </tbody>
          </table>
        `
      }

      const generateBuoys = async () => {
        const list = await fetchList()
        const mainContainer = document.getElementById('container')
        for (const buoy of list.filter((b) => b.properties.status === 'active')) {
          const info = await fetchWithReferer(buoy.url)
          const details = document.createElement('details')
          const summary = document.createElement('summary')
          const container = document.createElement('div')
          details.id = buoy.id
          summary.innerText = buoy.properties.area
          container.innerHTML = genHTMLTable(info) + moreInfo(buoy)
          details.appendChild(summary)
          details.appendChild(container)
          mainContainer.appendChild(details)
        }
      }

      addEventListener('DOMContentLoaded', async (event) => {
        // generate buoys
        await generateBuoys()

        // open details if any on query
        if (window.location.search) {
          const id = window.location.search.substring(1)
          const details = document.getElementById(id)
          if (details) details.open = true
        }
      })
    </script>
  </body>
</html>
